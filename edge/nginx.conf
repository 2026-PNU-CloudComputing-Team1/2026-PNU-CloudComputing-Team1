worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # nginx:alpine의 mime.types는 최근 버전에서 vtt/m3u8을 모두 포함하므로 별도 선언 불필요
    # (선언하면 duplicate extension 경고 발생)

    # CDN 엣지 캐시 — .ts/.vtt 같은 immutable 자산만 캐싱
    # .m3u8은 nginx-origin이 Cache-Control: no-cache를 내려주므로 자동으로 통과
    proxy_cache_path /var/cache/nginx/edge
                     levels=1:2
                     keys_zone=edge_cache:10m
                     max_size=500m
                     inactive=10m
                     use_temp_path=off;

    # X-Cache-Status로 HIT/MISS/EXPIRED 확인 (프론트에서 캐싱 동작 시연용)
    log_format edge '$remote_addr $request_method $request_uri '
                    'status=$status cache=$upstream_cache_status '
                    'rt=$request_time urt=$upstream_response_time';
    access_log /dev/stdout edge;
    error_log  /dev/stderr warn;

    upstream origin {
        server nginx-origin:8080;
        keepalive 16;
    }

    server {
        listen 8080;
        server_name _;

        # 엣지가 always 헤더로 다시 한 번 CORS 강제 (origin 헤더가 빠져도 동작)
        add_header Access-Control-Allow-Origin  "*"                          always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS"               always;
        add_header X-Cache-Status               $upstream_cache_status       always;
        add_header X-Edge-Delay-Ms              "$edge_delay_ms"             always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        location / {
            proxy_pass         http://origin;
            proxy_http_version 1.1;
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   Connection "";

            # origin이 내려준 Cache-Control을 그대로 사용해 캐싱 여부 결정
            # .m3u8은 no-cache라 자동 우회, .ts/.vtt는 max-age=3600이라 캐시됨
            proxy_cache            edge_cache;
            proxy_cache_valid      200 206 1h;
            proxy_cache_valid      404      10s;
            proxy_cache_use_stale  error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_lock       on;
            proxy_cache_key        "$scheme$request_method$host$request_uri";

            # 라이브 스트리밍에서 버퍼링은 지연 누적의 원인
            proxy_buffering        off;
        }
    }

    # entrypoint.sh가 DELAY_MS 값을 이 변수에 주입 (envsubst가 아닌 nginx 변수)
    # add_header에서 응답 헤더로도 노출 — 디버깅 편의
    map $host $edge_delay_ms {
        default "${EDGE_DELAY_MS}";
    }
}
