services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - streaming-net

  mediamtx:
    image: bluenviron/mediamtx:latest
    environment:
      MTX_HLSALLOWORIGINS: "*"
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
    ports:
      # 1935(RTMP)만 외부 노출 — OBS push용.
      # 9997(API), 8888(HLS) 호스트 매핑 제거: API는 내부 전용,
      # HLS는 nginx-origin(:8080/hls/) 경유로만 외부 노출.
      - "1935:1935"
    networks:
      - streaming-net

  # OBS로 직접 송출 시 사용하지 않음. 샘플 영상으로 라이브 시뮬레이션이 필요할 때만 주석 해제.
  # stream-publisher:
  #   build:
  #     context: ./backend
  #   command:
  #     - sh
  #     - -c
  #     - |
  #       ffmpeg -re -stream_loop -1 -i /sample/AWS.mp4 \
  #         -c:v libx264 -preset veryfast -tune zerolatency \
  #         -c:a aac \
  #         -f flv "rtmp://mediamtx:1935/live/demo"
  #   profiles:
  #     - sample-live
  #   volumes:
  #     - ./sample:/sample
  #   depends_on:
  #     - mediamtx
  #   networks:
  #     - streaming-net

  live-transcoder:
    build:
      context: ./backend
    command:
      - sh
      - -c
      - |
        while true; do
          # mediamtx API 포트가 열릴 때까지 대기 (TCP 연결 확인)
          until python3 -c "import socket,sys; s=socket.socket(); s.settimeout(2); r=s.connect_ex(('mediamtx',9997)); s.close(); sys.exit(0 if r==0 else 1)" 2>/dev/null; do
            echo '[live-transcoder] mediamtx 대기 중...'
            sleep 2
          done
          echo '[live-transcoder] mediamtx 준비 완료, FFmpeg 시작'
          # OBS가 이미 H264로 인코딩해서 보내므로 영상은 그대로 copy.
          # 오디오만 AAC 44.1k/128k로 정규화. analyzeduration 넉넉히 줘서 SPS 수신 대기.
          ffmpeg -hide_banner -loglevel warning \
            -analyzeduration 10000000 -probesize 10000000 \
            -fflags nobuffer -flags low_delay \
            -i "rtmp://mediamtx:1935/live/demo" \
            -c:v copy \
            -c:a aac -ar 44100 -b:a 128k \
            -f flv "rtmp://mediamtx:1935/live/smooth"
          sleep 1
        done
    depends_on:
      - mediamtx
    networks:
      - streaming-net

  backend:
    build:
      context: ./backend
    environment:
      REDIS_URL: redis://redis:6379/0
      FRONTEND_ORIGIN: http://localhost:3000
      USE_MOCK_SUBTITLES: "false"
      STT_STREAM_ID: demo
      SUBTITLE_TRANSLATED_CHANNEL: subtitle:translated
      CAPTION_INPUT_PATH: /sample/AWS.mp4
      CAPTION_LIVE_INPUT_URL: rtmp://mediamtx:1935/live/smooth
      CAPTION_OUTPUT_DIR: /data/audio
      SEGMENT_DURATION: 1.5
    ports:
      - "8000:8000"
    volumes:
      - ./sample:/sample
      - audio-data:/data/audio
      # 데모용: 프론트의 "Kill Edge" 버튼이 docker stop/start로 엣지 컨테이너를 제어
      # 프로덕션에서는 절대 마운트하지 말 것 (root 권한 노출)
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
      - mediamtx
    networks:
      - streaming-net

  whisper:
    build:
      context: ./whisper
      args:
        WHISPER_MODEL: small
    environment:
      REDIS_URL: redis://redis:6379
      WHISPER_MODEL: small
      SOURCE_LANG: ko
      SEGMENT_DURATION: 1.5
      BUFFER_MAX_SEC: 3
      WHISPER_BEAM_SIZE: 3
      MIN_TEXT_CHARS: 3
      MAX_NO_SPEECH_PROB: 0.65
      MIN_AVG_LOGPROB: -1.0
      SILENCE_RMS_THRESHOLD: 120
      WHISPER_VAD_FILTER: "false"
    volumes:
      - audio-data:/data/audio
      - ./sample:/sample
      - hf-cache:/root/.cache/huggingface
    depends_on:
      - redis
    networks:
      - streaming-net

  translator:
    build:
      context: ./translator
    environment:
      REDIS_URL: redis://redis:6379
      VTT_DIR: /data/subtitles
      SOURCE_LANG: ko
      TARGET_LANGS: en,zh,ja
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/gcp-key.json
    volumes:
      - subtitle-data:/data/subtitles
      - ./secrets/gcp-key.json:/secrets/gcp-key.json:ro
    depends_on:
      - redis
    networks:
      - streaming-net

  subtitle-pub:
    build:
      context: ./subtitle-pub
    volumes:
      - subtitle-data:/data/subtitles
    environment:
      REDIS_URL: redis://redis:6379
      VTT_DIR: /data/subtitles
      SEGMENT_DURATION: 1.5
      PLAYLIST_SIZE: 5
      # live-transcoder의 publish 경로(live/smooth)와 일치해야 master.m3u8 영상 404 없음
      HLS_STREAM_URI: /hls/live/smooth/index.m3u8
    depends_on:
      - redis
    networks:
      - streaming-net

  nginx-origin:
    build:
      context: ./nginx-origin
    ports:
      - "8080:8080"
    volumes:
      - subtitle-data:/data/subtitles:ro
    depends_on:
      - subtitle-pub
    networks:
      - streaming-net

  audio-extractor:
    build:
      context: ./audio-extractor
    profiles:
      - test
    environment:
      REDIS_URL: redis://redis:6379
      INPUT_URL: /sample/demo.mp4
      OUTPUT_DIR: /data/audio
      SEGMENT_DURATION: 1.5
      REALTIME: "true"
    volumes:
      - audio-data:/data/audio
      - ./sample:/sample
    depends_on:
      - redis
      - whisper
    networks:
      - streaming-net

  audio-pusher:
    build:
      context: ./audio-pusher
    profiles:
      - test
    environment:
      REDIS_URL: redis://redis:6379
      SAMPLE_DIR: /sample
      SEGMENT_DURATION: 1.5
      REALTIME: "true"
    volumes:
      - ./sample:/sample
    depends_on:
      - redis
      - whisper
    networks:
      - streaming-net

  edge-korea:
    build:
      context: ./edge
    environment:
      DELAY_MS: 10
    ports:
      - "8081:8080"
    cap_add:
      - NET_ADMIN
    depends_on:
      - nginx-origin
    networks:
      - streaming-net

  edge-japan:
    build:
      context: ./edge
    environment:
      DELAY_MS: 50
    ports:
      - "8082:8080"
    cap_add:
      - NET_ADMIN
    depends_on:
      - nginx-origin
    networks:
      - streaming-net

  edge-china:
    build:
      context: ./edge
    environment:
      DELAY_MS: 80
    ports:
      - "8083:8080"
    cap_add:
      - NET_ADMIN
    depends_on:
      - nginx-origin
    networks:
      - streaming-net

  edge-us:
    build:
      context: ./edge
    environment:
      DELAY_MS: 180
    ports:
      - "8084:8080"
    cap_add:
      - NET_ADMIN
    depends_on:
      - nginx-origin
    networks:
      - streaming-net

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
      VITE_HLS_URL: http://localhost:8080/hls/live/smooth/index.m3u8
      # 엣지 라우팅용 — 프론트가 위치 기반으로 영상/자막 출처를 선택
      VITE_ORIGIN_URL: http://localhost:8080
      VITE_EDGE_KR_URL: http://localhost:8081
      VITE_EDGE_JP_URL: http://localhost:8082
      VITE_EDGE_CN_URL: http://localhost:8083
      VITE_EDGE_US_URL: http://localhost:8084
    ports:
      - "3000:3000"
    depends_on:
      - backend
      - nginx-origin
    networks:
      - streaming-net

networks:
  streaming-net:
    driver: bridge

volumes:
  audio-data:
  hf-cache:
  subtitle-data: