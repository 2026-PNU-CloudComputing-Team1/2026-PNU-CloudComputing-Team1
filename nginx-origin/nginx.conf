worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # nginx:alpine의 mime.types에 vtt/m3u8이 없는 경우 대비
    # 없으면 브라우저가 octet-stream으로 받아 자막 파싱 실패
    types {
        text/vtt                      vtt;
        application/vnd.apple.mpegurl m3u8;
    }

    # 파일 종류별 캐싱 전략
    # .m3u8: 라이브 스트리밍에서 2초마다 갱신되므로 절대 캐시 금지
    # .ts/.vtt: 한 번 생성되면 내용이 바뀌지 않으므로(immutable) 엣지 캐시 허용
    map $uri $cache_ctrl {
        ~\.m3u8$  "no-cache, no-store, must-revalidate";
        ~\.ts$    "public, max-age=3600";
        ~\.vtt$   "public, max-age=3600";
        default   "no-cache";
    }

    server {
        listen 8080;
        server_name _;

        # always 플래그: 4xx/5xx 오류 응답에도 헤더를 포함
        # 엣지 서버가 404를 캐싱하지 않으려면 Cache-Control 헤더가 오류 시에도 필요
        add_header Access-Control-Allow-Origin  "*"            always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Cache-Control                $cache_ctrl    always;

        # 브라우저 CORS preflight 요청 처리
        if ($request_method = OPTIONS) {
            return 204;
        }

        # subtitle-pub이 시작 시 생성하는 정적 파일
        # 영상 스트림 URI + 언어별 자막 트랙 URI를 하나로 묶어 hls.js에 전달
        location = /master.m3u8 {
            alias /data/subtitles/master.m3u8;
        }

        # subtitle-pub이 vtt:ready 수신 시마다 갱신하는 파일들
        # alias: location 접두사(/subtitles/)를 제거하고 실제 경로로 대체
        # root와 달리 URI 앞부분을 잘라내므로 /subtitles/en/a.vtt → /data/subtitles/en/a.vtt
        location /subtitles/ {
            alias /data/subtitles/;
            autoindex off;
        }

        # MediaMTX HLS를 /hls/ 경로로 통합해 프론트가 포트 하나(8080)만 바라보게 함
        # proxy_pass에 trailing slash가 있으면 location 접두사(/hls/)를 제거하고 전달
        # → /hls/live/stream/index.m3u8  becomes  http://mediamtx:8888/live/stream/index.m3u8
        location /hls/ {
            proxy_pass         http://mediamtx:8888/;
            # HTTP/1.0은 keep-alive 미지원 — 1.1로 고정해 MediaMTX와 연결 재사용
            proxy_http_version 1.1;
            proxy_set_header   Host      $host;
            proxy_set_header   X-Real-IP $remote_addr;
            # 라이브 스트리밍은 버퍼링하면 지연이 누적되므로 즉시 전달
            proxy_buffering    off;
            # MediaMTX가 cookieCheck 302 리다이렉트 시 Location: /live/... 를 반환하는데
            # 클라이언트가 이를 따라가면 /hls/ 접두사가 없어 404가 남
            # → /hls/ 접두사를 붙여 nginx-origin 경유 경로로 재작성
            proxy_redirect     ~^(/.+)$ /hls$1;
        }
    }
}
