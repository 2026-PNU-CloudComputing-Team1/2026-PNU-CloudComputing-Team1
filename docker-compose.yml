version: '3.9'

volumes:
  audio-data:
  hf-cache:    
  # HuggingFace 모델 캐시 — 첫 실행 후 재다운로드 없음

networks:
  streaming:
    driver: bridge

services:

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6380:6379"
      # 로컬 redis와 포트 충돌 방지 위해 6380으로 매핑
    networks:
      - streaming

  whisper:
    build:
      context: ./whisper
      args:
        WHISPER_MODEL: base
    container_name: whisper
    volumes:
      - audio-data:/data/audio
      - ./sample:/sample
      - hf-cache:/root/.cache/huggingface
    environment:
      - REDIS_URL=redis://redis:6379
      - WHISPER_MODEL=base
      - SOURCE_LANG=ko # 한국어 음식 인식 후 텍스트로 변환
      - SEGMENT_DURATION=2
    networks:
      - streaming
    depends_on:
      - redis
